# ?????????????????????????????????????????????????
# CineBook ? application.properties (dev / prod)
# ?????????????????????????????????????????????????

spring.application.name=cinebook-platform
spring.profiles.active=local

# ?? Server ????????????????????????????????????????
server.port=8080
server.servlet.context-path=/

# ?? PostgreSQL (production) ???????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/cinebook
spring.datasource.username=cinebook_user
spring.datasource.password=cinebook_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ?? JPA / Hibernate ???????????????????????????????
# NEVER use 'create' or 'create-drop' in prod ? Flyway owns the schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ?? Flyway ????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ?? Redis ?????????????????????????????????????????
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
# spring.data.redis.password=your_redis_password  # uncomment for auth

# ?? Kafka ?????????????????????????????????????????
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=cinebook-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.cinebook.*

# ?? Security / OAuth2 JWT ?????????????????????????
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://your-auth-server.com
# Or use a static public key for local dev:
# spring.security.oauth2.resourceserver.jwt.public-key-location=classpath:public.pem

# ?? Actuator ??????????????????????????????????????
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ?? OpenAPI / Swagger ?????????????????????????????
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# ?? Logging ???????????????????????????????????????
logging.level.com.cinebook=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN