# ?????????????????????????????????????????????????
# CineBook ? application-test.properties
#
# Activated automatically by:
#   @SpringBootTest
#   @ActiveProfiles("test")
#
# OR for JPA-slice tests:
#   @DataJpaTest  ? Spring Boot auto-replaces DataSource with H2
#                    without needing this file at all
# ?????????????????????????????????????????????????

# ?? H2 In-Memory Database ?????????????????????????
#
# MODE=PostgreSQL  ? H2 mimics PostgreSQL syntax
#   (supports sequences, UUID type, ILIKE, etc.)
# DB_CLOSE_DELAY=-1 ? keep DB alive for test duration
# NON_KEYWORDS=value ? avoids H2 treating 'value' as reserved
#
spring.datasource.url=jdbc:h2:mem:cinebook_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=value
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console (useful to inspect test DB state during debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? JPA ???????????????????????????????????????????
# create-drop: H2 schema is built from entities on test start,
# torn down when ApplicationContext closes
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Use H2Dialect ? NOT PostgreSQLDialect ? when running against H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ?? Flyway ????????????????????????????????????????
# Disabled in tests ? Hibernate creates the schema instead.
# Enable only if you want to test migrations explicitly.
spring.flyway.enabled=false

# ?? Redis (mock/stub for tests) ???????????????????
# If you're NOT using Testcontainers for Redis, you can disable
# auto-configuration and mock the RedisTemplate in tests:
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# For tests that DO need Redis, use Testcontainers (see TestConfig.java)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ?? Kafka ?????????????????????????????????????????
# @EmbeddedKafka in tests sets the broker address automatically via
# @SpringBootTest(properties = "spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}")
# The property below is the fallback for tests NOT using embedded Kafka.
spring.kafka.bootstrap-servers=localhost:9092

# ?? Security ??????????????????????????????????????
# Disable the JWT issuer check in tests (use @WithMockUser instead)
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

# ?? Logging ???????????????????????????????????????
logging.level.com.cinebook=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE