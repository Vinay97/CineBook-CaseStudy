
#spring.datasource.url=jdbc:h2:mem:cinebook_local;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=value
spring.datasource.url=jdbc:h2:file:./data/cinebook_local
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
app.security.jwt-enabled=true
app.jwt.secret=cinebook-local-dev-secret-key-32-chars-minimum-length-here
app.jwt.expiration-ms=86400000

# ?? JPA ??????????????????????????????????????????????????????
# create-drop: schema built from entities on startup, dropped on shutdown
# Use 'update' if you want the schema to survive restarts
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ?? Flyway ? disabled locally (Hibernate manages schema instead) ??
spring.flyway.enabled=false

# ?? Security ? use a simple static secret locally ?????????????
# Disables the JWT issuer-uri lookup (which would call an auth server)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

# ?? Logging ? verbose locally ?????????????????????????????????
logging.level.com.cinebook=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE